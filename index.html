<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TODO Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner">
        <p class="eyebrow">Single Page Application</p>
        <h1>TODO Manager von Rodion</h1>
        <p class="subtitle">
          Aufgaben verwalten, Prioritaet berechnen und Fortschritt verfolgen.
        </p>
      </div>
    </header>

    <main class="page">
      <section class="panel form-panel" aria-labelledby="form-title">
        <div class="panel-header">
          <h2 id="form-title">TODO erfassen</h2>
          <p class="hint">Alle Felder sind Pflichtfelder.</p>
        </div>

        <form id="todo-form" novalidate>
          <input type="hidden" id="todo-id" />

          <div class="field">
            <label for="title">Title</label>
            <input
              id="title"
              name="title"
              type="text"
              maxlength="255"
              required
              autocomplete="off"
              placeholder="z.B. Flug nach Rom buchen"
            />
            <span class="field-error" data-error-for="title"></span>
          </div>

          <fieldset class="type-field">
            <legend>Typ</legend>

            <div class="type-options">
              <label class="type-card">
                <input
                  type="radio"
                  name="todo-type"
                  value="task"
                  required
                />
                <span>Task</span>
              </label>

              <label class="type-card">
                <input
                  type="radio"
                  name="todo-type"
                  value="event"
                />
                <span>Event</span>
              </label>
            </div>

            <span class="field-error" data-error-for="type"></span>
          </fieldset>
          <div class="field">
            <label for="description">Beschreibung</label>
            <textarea
              id="description"
              name="description"
              rows="4"
              required
              maxlength="800"
              placeholder="Was genau soll erledigt werden?"
            ></textarea>
            <span class="field-error" data-error-for="description"></span>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="author">Autor</label>
              <input
                id="author"
                name="author"
                type="text"
                maxlength="20"
                required
                autocomplete="off"
                placeholder="Max"
              />
              <span class="field-error" data-error-for="author"></span>
            </div>

            <div class="field">
              <label for="category">Kategorie</label>
              <select id="category" name="category" required>
                <option value="">Bitte waehlen</option>
                <option value="Sport">Sport</option>
                <option value="Reisen">Reisen</option>
                <option value="Restaurant">Restaurant</option>
                <option value="Lernen">Lernen</option>
                <option value="Familie">Familie</option>
              </select>
              <span class="field-error" data-error-for="category"></span>
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label class="toggle">
                <input id="important" type="checkbox" />
                Wichtig
              </label>
            </div>
            <div class="field">
              <label class="toggle">
                <input id="urgent" type="checkbox" />
                Dringend
              </label>
            </div>
            <div class="field">
              <label for="priority">Prioritaet (Display only)</label>
              <input id="priority" type="text" readonly />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="start-date">Startdatum</label>
              <input id="start-date" name="start-date" type="date" required />
              <span class="field-error" data-error-for="startDate"></span>
            </div>
            <div class="field">
              <label for="end-date">Enddatum</label>
              <input id="end-date" name="end-date" type="date" required />
              <span class="field-error" data-error-for="endDate"></span>
            </div>
          </div>

          <div class="field">
            <label for="progress">Fortschritt in Prozent (0 - 100)</label>
            <input
              id="progress"
              name="progress"
              type="number"
              min="0"
              max="100"
              step="1"
              required
              placeholder="0"
            />
            <span class="field-error" data-error-for="progress"></span>
          </div>

          <div class="form-actions">
            <button class="btn primary" type="submit" id="submit-btn">
              TODO speichern
            </button>
            <button class="btn ghost" type="reset" id="reset-btn">
              Formular leeren
            </button>
          </div>
        </form>
      </section>

      <section class="panel tasks-panel" aria-labelledby="list-title">
        <div class="panel-header">
          <div>
            <h2 id="list-title">TODOs</h2>
            <p class="hint" id="result-count">0 Treffer</p>
          </div>
          <div class="search">
            <label for="search" class="sr-only">TODOs suchen</label>
            <input
              id="search"
              type="search"
              placeholder="Suchen nach Titel, Autor, Kategorie ..."
              autocomplete="off"
            />
          </div>
        </div>

        <div id="todo-list" class="todo-list"></div>
        <div id="empty-state" class="empty-state" hidden>
          Noch keine TODOs. Fuege die erste Aufgabe hinzu.
        </div>

        <div id="calendar-view" class="calendar-view" aria-labelledby="cal-month-year">
          <div class="calendar-header">
            <button
              type="button"
              class="btn ghost small"
              id="cal-prev"
              aria-label="Vorheriger Monat"
            >
              &lt;
            </button>
            <h3 id="cal-month-year">Monat Jahr</h3>
            <button
              type="button"
              class="btn ghost small"
              id="cal-next"
              aria-label="Naechster Monat"
            >
              &gt;
            </button>
          </div>
          <div class="calendar-grid-header">
            <span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span><span>So</span>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </div>
      </section>
    </main>

    <template id="todo-card-template">
      <article class="todo-card">
        <div class="todo-header">
          <div>
            <h3 class="todo-title"></h3>
            <p class="todo-meta"></p>
          </div>
          <span class="priority-pill"></span>
        </div>
        <p class="todo-description"></p>
        <div class="todo-tags"></div>
        <div class="todo-dates"></div>
        <div class="progress">
          <div class="progress-bar"></div>
        </div>
        <div class="todo-footer">
          <span class="progress-label"></span>
          <div class="todo-actions">
            <button class="btn small" data-action="edit" type="button">
              Bearbeiten
            </button>
            <button class="btn small danger" data-action="delete" type="button">
              Loeschen
            </button>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
